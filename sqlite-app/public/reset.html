<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Set your password — Team Task List</title>
<style>
  :root{ --ink:#1a1d23; --muted:#6b7280; --line:#e5e7eb; --bg:#f6f7f9; --card:#fff;
    --primary:#2f4b7c; --primary-dark:#26406b; --danger:#b3261e; --ok:#15803d;
    --radius:10px; --shadow:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04); }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--ink);
    background:var(--bg);min-height:100vh;display:grid;place-items:center;padding:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:28px;width:100%;max-width:360px}
  h1{font-size:20px;margin:0 0 4px}
  p.sub{color:var(--muted);font-size:13px;margin:0 0 20px}
  label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
  input{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font:inherit;margin-bottom:14px}
  button{font:inherit;cursor:pointer;border:none;border-radius:8px;background:var(--primary);color:#fff;
    padding:10px 14px;font-weight:600;width:100%}
  button:hover{background:var(--primary-dark)}
  .msg{font-size:13px;margin-top:12px;min-height:18px}
  .err{color:var(--danger)} .ok{color:var(--ok)}
  a{color:var(--primary)}
</style>
</head>
<body>
  <div class="card">
    <h1>Set your password</h1>
    <p class="sub" id="who">Choose a password for your account.</p>
    <label for="pw">New password</label>
    <input id="pw" type="password" placeholder="At least 6 characters" autocomplete="new-password" />
    <label for="pw2">Confirm password</label>
    <input id="pw2" type="password" placeholder="Re-type it" autocomplete="new-password" />
    <button id="go">Set password</button>
    <div class="msg" id="msg"></div>
  </div>
<script>
  const qs = new URLSearchParams(location.search);
  const email = qs.get("email") || "";
  const token = qs.get("token") || "";
  const $ = id => document.getElementById(id);
  if(email) $("who").textContent = `Choose a password for ${email}.`;
  if(!email || !token){ $("msg").className = "msg err"; $("msg").textContent = "This link is missing information. Ask your manager to resend it."; }

  $("go").onclick = async () => {
    const pw = $("pw").value, pw2 = $("pw2").value;
    $("msg").className = "msg";
    if(pw.length < 6){ $("msg").className = "msg err"; $("msg").textContent = "Password must be at least 6 characters."; return; }
    if(pw !== pw2){ $("msg").className = "msg err"; $("msg").textContent = "The two passwords don't match."; return; }
    $("go").disabled = true;
    try{
      const r = await fetch("/api/reset", { method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ email, token, password: pw }) });
      const data = await r.json().catch(() => ({}));
      if(!r.ok) throw new Error(data.error || "Could not set password.");
      $("msg").className = "msg ok";
      $("msg").innerHTML = 'Password set! You can now <a href="/">sign in</a>.';
    }catch(e){ $("msg").className = "msg err"; $("msg").textContent = e.message; }
    finally{ $("go").disabled = false; }
  };
  $("pw2").addEventListener("keydown", e => { if(e.key === "Enter") $("go").click(); });
</script>
</body>
</html>
